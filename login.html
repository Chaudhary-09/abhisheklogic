<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>M.R.D. INTER COLLAGE Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      transition: background 0.3s, color 0.3s;
      background: #f0f0f0;
      overflow: hidden;
    }

    video#bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
    }

    .mute-btn {
      position: absolute;
      top: 10px;
      left: 20px;
      background: rgba(255,255,255,0.7);
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .banner {
      width: 100%;
      background: #004080;
      color: white;
      overflow: hidden;
      white-space: nowrap;
      box-sizing: border-box;
      padding: 10px 0;
      font-size: 20px;
      position: relative;
      z-index: 1;
    }

    .banner-text {
      display: inline-block;
      animation: scroll 15s linear infinite;
      padding-left: 100%;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .mode-toggle {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.3s ease;
      z-index: 2;
    }

    .container {
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      position: relative;
      z-index: 1;
    }

    .container.dark {
      background: #2c3e50;
      color: white;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .captcha-box {
      background-color: skyblue;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 22px;
      color: #fff;
      text-align: center;
      letter-spacing: 3px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-family: 'Courier New', monospace;
    }

    .refresh-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.5s ease;
    }

    .refresh-icon:hover {
      transform: rotate(360deg);
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: linear-gradient(45deg, #ff6f61, #ffcc00);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .switch-mode {
      text-align: center;
      margin-top: 15px;
      color: #0077cc;
      cursor: pointer;
    }

    .welcome {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: bold;
      background: linear-gradient(to right, #ff6f61, #ffcc00, #33cc99);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: 'Georgia', serif;
      text-align: center;
      display: none;
      z-index: 2;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <video id="bgVideo" autoplay muted loop>
    <source src="videos/school.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>
<a href="transport.html">Go to Transport Page</a>
  <button class="mute-btn" onclick="toggleMute()">🔊 Mute</button>

  <div class="banner">
    <div class="banner-text">M.R.D. INTER COLLAGE BISAVALI RAYA (MATHURA)</div>
  </div>

  <div class="mode-toggle" onclick="toggleMode()">🌙</div>

  <div class="container" id="loginForm">
    <h2 id="formTitle">Student Registration</h2>
    <input type="text" id="name" placeholder="Student Name" required />
    <input type="text" id="mobile" placeholder="Mobile Number" required />
    <input type="password" id="password" placeholder="Password" required />
    <input type="password" id="repassword" placeholder="Re-enter Password" required />

    <div class="captcha-box">
      <span id="captchaCode">AB@2C#</span>
      <div class="refresh-icon" onclick="refreshCaptcha()">🔄</div>
    </div>
    <input type="text" id="captchaInput" placeholder="Enter Captcha" required />

    <button class="btn" onclick="submitForm()">Submit</button>
    <div class="switch-mode" onclick="switchForm()">Already have an account?</div>
  </div>

  <div class="welcome" id="welcomeMessage">WELCOME BACK YOUR APNA SCHOOL 🎉</div>

 <script>
  let darkMode = false;
  let isLoginMode = false;
  let video = document.getElementById("bgVideo");

  function toggleMute() {
    video.muted = !video.muted;
    <!-- document.querySelector(".mute-btn").textContent = video.muted ? "🔊 Mute" : "🔇 Unmute"; -->
  }

  function toggleMode() {
    darkMode = !darkMode;
    document.body.style.background = darkMode ? '#1a1a1a' : '#f0f0f0';
    const icon = document.querySelector('.mode-toggle');
    icon.textContent = darkMode ? '☀️' : '🌙';
    icon.style.transform = 'rotate(180deg)';
    setTimeout(() => icon.style.transform = 'rotate(0deg)', 300);
    document.getElementById('loginForm').classList.toggle('dark', darkMode);
  }

  function switchForm() {
    isLoginMode = !isLoginMode;
    document.getElementById('formTitle').textContent = isLoginMode ? 'Student Login' : 'Student Registration';
    document.getElementById('repassword').style.display = isLoginMode ? 'none' : 'block';
    document.getElementById('captchaInput').style.display = isLoginMode ? 'none' : 'block';
    document.querySelector('.captcha-box').style.display = isLoginMode ? 'none' : 'flex';
  }

  function generateCaptcha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 6; i++) {
      code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById('captchaCode').textContent = code;
  }

  function refreshCaptcha() {
    generateCaptcha();
  }

  function submitForm() {
    const name = document.getElementById('name').value.trim();
    const mobile = document.getElementById('mobile').value.trim();
    const password = document.getElementById('password').value.trim();
    const repassword = document.getElementById('repassword').value.trim();
    const captchaInput = document.getElementById('captchaInput').value.trim();
    const captchaCode = document.getElementById('captchaCode').textContent;

    if (!name || !mobile || !password || (!isLoginMode && (!repassword || !captchaInput))) {
      alert("Please fill all fields.");
      return;
    }

    if (!isLoginMode && password !== repassword) {
      alert("Passwords do not match.");
      return;
    }

    if (!isLoginMode && captchaInput !== captchaCode) {
      alert("Captcha does not match.");
      return;
    }

    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('welcomeMessage').style.display = 'block';
  }

  window.onload = generateCaptcha;
</script>
